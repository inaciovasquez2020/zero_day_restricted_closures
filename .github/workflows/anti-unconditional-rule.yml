name: anti-unconditional-rule

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    name: anti-unconditional-rule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run anti-unconditional verifier
        run: python3 verification/anti_unconditional_rule.py
